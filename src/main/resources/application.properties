spring.application.name=survey-api

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.example.ser421lab6=DEBUG

# Debugging
server.error.include-message=always
server.error.include-binding-errors=always

#Database: PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/surveydb
spring.datasource.name=surveyuser
spring.datasource.password=surveypassword

#JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

