services:
  postgres:
    image: postgres:16
    container_name: survey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: surveyDB
      POSTGRES_USER: surveyUser
      POSTGRES_PASSWORD: surveyPassword
    ports:
      - "5432:5432"
    volumes:
      - survey_pg_data:/var/lib/postgresql/data

volumes:
  survey_pg_data: