services:
  postgres:
    image: postgres:16
    container_name: survey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-surveyDB}
      POSTGRES_USER: ${POSTGRES_USER:-surveyUser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-surveyPassword}
    ports:
      - "5433:5432"
    volumes:
      - survey_pg_data:/var/lib/postgresql/data

volumes:
  survey_pg_data: